<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.3); /* Dim the screen */
      cursor: crosshair;
      user-select: none;
    }
    #selection {
      position: absolute;
      border: 2px dashed #ffffff;
      background: rgba(255, 255, 255, 0.1);
      display: none;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.4); /* Darken everything outside the box */
    }
  </style>
</head>
<body>
  <div id="selection"></div>
  <script>
    const { ipcRenderer } = require('electron');
    let isDrawing = false;
    let startX = 0, startY = 0;
    const selection = document.getElementById('selection');

    document.addEventListener('mousedown', (e) => {
      isDrawing = true;
      startX = e.clientX;
      startY = e.clientY;
      selection.style.left = startX + 'px';
      selection.style.top = startY + 'px';
      selection.style.width = '0px';
      selection.style.height = '0px';
      selection.style.display = 'block';
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDrawing) return;
      const currentX = e.clientX;
      const currentY = e.clientY;
      const width = Math.abs(currentX - startX);
      const height = Math.abs(currentY - startY);
      
      selection.style.width = width + 'px';
      selection.style.height = height + 'px';
      selection.style.left = (currentX < startX ? currentX : startX) + 'px';
      selection.style.top = (currentY < startY ? currentY : startY) + 'px';
    });

    document.addEventListener('mouseup', (e) => {
      if (!isDrawing) return;
      isDrawing = false;
      const rect = selection.getBoundingClientRect();
      const bounds = {
        x: Math.round(rect.left),
        y: Math.round(rect.top),
        width: Math.round(rect.width),
        height: Math.round(rect.height)
      };
      
      if (bounds.width > 5 && bounds.height > 5) {
        ipcRenderer.send('region-selected', bounds);
      } else {
        ipcRenderer.send('region-selected', null);
      }
    });
    
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') ipcRenderer.send('region-selected', null);
    });
  </script>
</body>
</html>
